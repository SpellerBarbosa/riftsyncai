name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    permissions:
      contents: write

    strategy:
      fail-fast: false
      matrix:
        platform: [windows-latest]

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install frontend dependencies
        run: npm ci

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # Embutido no binario via option_env! — sem isso o sync nao funciona no app final
          API_ACCESS_TOKEN: ${{ secrets.API_ACCESS_TOKEN }}
          # GROQ_API_KEY: nao embutido — token gratuito compartilhado esgotaria rapido.
          # Fallback automatico para dicas procedurais quando Groq nao esta configurado.
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Spell Coach IA ${{ github.ref_name }}'
          releaseBody: |
            ## O que ha de novo

            Veja o [historico de commits](https://github.com/SpellerBarbosa/riftsyncai/commits/${{ github.ref_name }}) para detalhes.

            ### Instalacao
            Baixe o arquivo `.exe` abaixo e execute. O app atualiza automaticamente nas proximas versoes.
          releaseDraft: false
          prerelease: ${{ startsWith(github.ref_name, 'v0.') }}
          includeUpdaterJson: true
